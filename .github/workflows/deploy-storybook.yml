name: Deploy Storybooks

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: storybook-pages
  cancel-in-progress: false

env:
  NODE_VERSION: "20.19.0"
  CI: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Build all Storybooks
        run: npm run build-storybook

      - name: Assemble Pages artifact
        run: |
          mkdir -p site/storybook/react site/storybook/vue site/storybook/angular
          cp -R packages/quanta-kit-react/storybook-static/. site/storybook/react/
          cp -R packages/quanta-kit-vue/storybook-static/. site/storybook/vue/
          cp -R packages/quanta-kit-angular/storybook-static/. site/storybook/angular/
          cat > site/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="UTF-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1.0" />
              <title>Quanta Kit Storybooks</title>
            </head>
            <body>
              <h1>Quanta Kit Storybooks</h1>
              <ul>
                <li><a href="./storybook/react/">React</a></li>
                <li><a href="./storybook/vue/">Vue</a></li>
                <li><a href="./storybook/angular/">Angular</a></li>
              </ul>
            </body>
          </html>
          HTML

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
