name: Deploy Storybooks

on:
  push:
    branches: [main]
    paths:
      - "packages/**"
      - "package.json"
      - "package-lock.json"
      - "turbo.json"
      - ".github/workflows/deploy-storybook.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: storybook-pages
  cancel-in-progress: true

env:
  NODE_VERSION: "20.19.0"
  CI: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Build all Storybooks
        run: npm run build-storybook

      - name: Assemble Pages artifact
        run: |
          mkdir -p site/storybook/react site/storybook/vue site/storybook/angular
          cp -R packages/quanta-kit-react/storybook-static/. site/storybook/react/
          cp -R packages/quanta-kit-vue/storybook-static/. site/storybook/vue/
          cp -R packages/quanta-kit-angular/storybook-static/. site/storybook/angular/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
