name: Generate Release Tags

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      remote:
        description: "Git remote to push tags to"
        required: true
        default: "origin"
        type: string

permissions:
  contents: write

concurrency:
  group: release-tags-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: "20.19.0"
  CI: true

jobs:
  tag:
    name: Create Missing Package Tags
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create and push missing tags
        env:
          REMOTE_NAME: ${{ github.event.inputs.remote || 'origin' }}
        run: node scripts/create-release-tags.cjs --push --remote="$REMOTE_NAME"
