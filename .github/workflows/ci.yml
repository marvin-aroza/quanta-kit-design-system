name: CI

on:
  push:
    branches: [main, next, beta, "alpha/**", "rc/**"]
    paths:
      - ".github/workflows/**"
      - ".changeset/**"
      - "apps/**"
      - "packages/**"
      - "docs/**"
      - "package.json"
      - "package-lock.json"
      - "turbo.json"
      - "README.md"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/**"
      - ".changeset/**"
      - "apps/**"
      - "packages/**"
      - "docs/**"
      - "package.json"
      - "package-lock.json"
      - "turbo.json"
      - "README.md"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CI: true
  NODE_VERSION: "20.19.0"
  CACHE_VERSION: v1

jobs:
  install:
    name: Install Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
            apps/*/node_modules
          key: ${{ runner.os }}-node-modules-${{ env.CACHE_VERSION }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-${{ env.CACHE_VERSION }}-

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci --prefer-offline --no-audit

      - name: Verify installation
        run: |
          npm list --depth=0 2>&1 || {
            EXIT_CODE=$?
            echo "::warning::npm list exited with code $EXIT_CODE (extraneous/peer dependency warnings are expected in monorepos)"
            if [ ! -d "node_modules" ]; then
              echo "::error::node_modules directory is missing"
              exit 1
            fi
          }

  commit-lint:
    name: Validate Commit Messages
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: install
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules cache
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
            apps/*/node_modules
          key: ${{ runner.os }}-node-modules-${{ env.CACHE_VERSION }}-${{ hashFiles('**/package-lock.json') }}
          fail-on-cache-miss: true

      - name: Validate commit messages
        run: npx commitlint --from=${{ github.event.pull_request.base.sha }} --to=${{ github.event.pull_request.head.sha }} --verbose

  security:
    name: Security & Dependency Checks
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules cache
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
            apps/*/node_modules
          key: ${{ runner.os }}-node-modules-${{ env.CACHE_VERSION }}-${{ hashFiles('**/package-lock.json') }}
          fail-on-cache-miss: true

      - name: Run runtime vulnerability audit (blocking)
        run: |
          echo "::group::NPM Audit (runtime only)"
          npm run audit:runtime
          echo "::endgroup::"

      - name: Run full dependency audit (informational)
        run: |
          echo "::group::NPM Audit (all dependencies)"
          npm run audit || echo "::warning::Full audit reported issues (including dev/tooling dependencies)"
          echo "::endgroup::"
        continue-on-error: true

      - name: Check for outdated packages
        run: |
          echo "::group::Outdated Packages"
          npm outdated --long || echo "::notice::Some packages have updates available"
          echo "::endgroup::"
        continue-on-error: true

      - name: Check for unused dependencies
        run: |
          echo "::group::Dependency Check"
          npx depcheck --ignores="@types/*,eslint-*,prettier,husky,@commitlint/*,turbo,@changesets/*" || echo "::notice::Review suggested"
          echo "::endgroup::"
        continue-on-error: true

  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules cache
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
            apps/*/node_modules
          key: ${{ runner.os }}-node-modules-${{ env.CACHE_VERSION }}-${{ hashFiles('**/package-lock.json') }}
          fail-on-cache-miss: true

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run check-types

  build:
    name: Build Packages
    runs-on: ubuntu-latest
    needs: [install, quality]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules cache
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
            apps/*/node_modules
          key: ${{ runner.os }}-node-modules-${{ env.CACHE_VERSION }}-${{ hashFiles('**/package-lock.json') }}
          fail-on-cache-miss: true

      - name: Build packages
        run: npm run build

      - name: Build Storybooks
        run: npm run build-storybook

  changeset-status:
    name: Changeset Status
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: install
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules cache
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
            apps/*/node_modules
          key: ${{ runner.os }}-node-modules-${{ env.CACHE_VERSION }}-${{ hashFiles('**/package-lock.json') }}
          fail-on-cache-miss: true

      - name: Check changeset status
        run: |
          echo "::group::Changeset Status"
          git fetch origin main:main
          npm run changeset:status -- --since=origin/main
          echo "::endgroup::"
