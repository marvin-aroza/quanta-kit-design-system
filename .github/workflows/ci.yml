name: CI

on:
  push:
    branches: [main, next, beta, "alpha/**", "rc/**"]
    paths:
      - ".github/workflows/**"
      - ".changeset/**"
      - "scripts/**"
      - "apps/**"
      - "packages/**"
      - "docs/**"
      - "package.json"
      - "package-lock.json"
      - "turbo.json"
      - "README.md"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/**"
      - ".changeset/**"
      - "scripts/**"
      - "apps/**"
      - "packages/**"
      - "docs/**"
      - "package.json"
      - "package-lock.json"
      - "turbo.json"
      - "README.md"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CI: true
  NODE_VERSION: "20.19.0"
  CACHE_VERSION: v1

jobs:
  workflow-lint:
    name: Workflow Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Lint GitHub Actions workflows
        uses: reviewdog/action-actionlint@v1

  install:
    name: Install Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v5
        with:
          path: |
            node_modules
            packages/*/node_modules
            apps/*/node_modules
          key: ${{ runner.os }}-node-modules-${{ env.CACHE_VERSION }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-${{ env.CACHE_VERSION }}-

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci --prefer-offline --no-audit

      - name: Verify installation
        run: |
          npm list --depth=0 2>&1 || {
            EXIT_CODE=$?
            echo "::warning::npm list exited with code $EXIT_CODE (extraneous/peer dependency warnings are expected in monorepos)"
            if [ ! -d "node_modules" ]; then
              echo "::error::node_modules directory is missing"
              exit 1
            fi
          }

  commit-lint:
    name: Validate Commit Messages
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: install
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules cache
        uses: actions/cache/restore@v5
        with:
          path: |
            node_modules
            packages/*/node_modules
            apps/*/node_modules
          key: ${{ runner.os }}-node-modules-${{ env.CACHE_VERSION }}-${{ hashFiles('**/package-lock.json') }}
          fail-on-cache-miss: true

      - name: Validate commit messages
        run: npx commitlint --from=${{ github.event.pull_request.base.sha }} --to=${{ github.event.pull_request.head.sha }} --verbose

  security:
    name: Security & Dependency Checks
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules cache
        uses: actions/cache/restore@v5
        with:
          path: |
            node_modules
            packages/*/node_modules
            apps/*/node_modules
          key: ${{ runner.os }}-node-modules-${{ env.CACHE_VERSION }}-${{ hashFiles('**/package-lock.json') }}
          fail-on-cache-miss: true

      - name: Run runtime vulnerability audit (blocking)
        run: |
          echo "::group::NPM Audit (runtime only)"
          npm run audit:runtime
          echo "::endgroup::"

      - name: Run full dependency audit (informational)
        run: |
          echo "::group::NPM Audit (all dependencies)"
          npm run audit || echo "::warning::Full audit reported issues (including dev/tooling dependencies)"
          echo "::endgroup::"
        continue-on-error: true

      - name: Check for outdated packages
        run: |
          echo "::group::Outdated Packages"
          npm outdated --long || echo "::notice::Some packages have updates available"
          echo "::endgroup::"
        continue-on-error: true

      - name: Check for unused dependencies
        run: |
          echo "::group::Dependency Check"
          npx depcheck --ignores="@types/*,eslint-*,prettier,husky,@commitlint/*,turbo,@changesets/*" || echo "::notice::Review suggested"
          echo "::endgroup::"
        continue-on-error: true

  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules cache
        uses: actions/cache/restore@v5
        with:
          path: |
            node_modules
            packages/*/node_modules
            apps/*/node_modules
          key: ${{ runner.os }}-node-modules-${{ env.CACHE_VERSION }}-${{ hashFiles('**/package-lock.json') }}
          fail-on-cache-miss: true

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run check-types

  markdown-lint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules cache
        uses: actions/cache/restore@v5
        with:
          path: |
            node_modules
            packages/*/node_modules
            apps/*/node_modules
          key: ${{ runner.os }}-node-modules-${{ env.CACHE_VERSION }}-${{ hashFiles('**/package-lock.json') }}
          fail-on-cache-miss: true

      - name: Lint markdown files
        run: npm run lint:md

  build:
    name: Build Packages
    runs-on: ubuntu-latest
    needs: [install, quality, markdown-lint]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules cache
        uses: actions/cache/restore@v5
        with:
          path: |
            node_modules
            packages/*/node_modules
            apps/*/node_modules
          key: ${{ runner.os }}-node-modules-${{ env.CACHE_VERSION }}-${{ hashFiles('**/package-lock.json') }}
          fail-on-cache-miss: true

      - name: Build packages
        run: npm run build

      - name: Build Storybooks
        run: npm run build-storybook

      - name: Collect Storybook artifacts
        run: |
          mkdir -p artifacts/storybook/react artifacts/storybook/vue artifacts/storybook/angular
          cp -R packages/quanta-kit-react/storybook-static/. artifacts/storybook/react/
          cp -R packages/quanta-kit-vue/storybook-static/. artifacts/storybook/vue/
          cp -R packages/quanta-kit-angular/storybook-static/. artifacts/storybook/angular/

      - name: Pack workspace tarballs
        run: node scripts/pack-workspaces.cjs

      - name: Upload Storybook artifacts
        uses: actions/upload-artifact@v6
        with:
          name: storybook-static
          path: artifacts/storybook
          if-no-files-found: error

      - name: Upload npm tarball artifacts
        uses: actions/upload-artifact@v6
        with:
          name: npm-tarballs
          path: artifacts/npm-tarballs
          if-no-files-found: error

  smoke-packages:
    name: Smoke Package Install
    runs-on: ubuntu-latest
    needs: [install, build]
    strategy:
      fail-fast: false
      matrix:
        workspace:
          - quanta-kit-design-system-react
          - quanta-kit-design-system-vue
          - quanta-kit-design-system-angular
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules cache
        uses: actions/cache/restore@v5
        with:
          path: |
            node_modules
            packages/*/node_modules
            apps/*/node_modules
          key: ${{ runner.os }}-node-modules-${{ env.CACHE_VERSION }}-${{ hashFiles('**/package-lock.json') }}
          fail-on-cache-miss: true

      - name: Build workspace package
        run: npm run build --workspace=${{ matrix.workspace }}

      - name: Smoke install packed tarball
        run: node scripts/smoke-install.cjs --workspace=${{ matrix.workspace }}

  tarball-integrity:
    name: Tarball Integrity
    runs-on: ubuntu-latest
    needs: [install, build]
    strategy:
      fail-fast: false
      matrix:
        workspace:
          - quanta-kit-design-system-react
          - quanta-kit-design-system-vue
          - quanta-kit-design-system-angular
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules cache
        uses: actions/cache/restore@v5
        with:
          path: |
            node_modules
            packages/*/node_modules
            apps/*/node_modules
          key: ${{ runner.os }}-node-modules-${{ env.CACHE_VERSION }}-${{ hashFiles('**/package-lock.json') }}
          fail-on-cache-miss: true

      - name: Build workspace package
        run: npm run build --workspace=${{ matrix.workspace }}

      - name: Verify tarball integrity
        run: node scripts/verify-package-tarball.cjs --workspace=${{ matrix.workspace }}

  runtime-smoke:
    name: Runtime Smoke
    runs-on: ubuntu-latest
    needs: [install, build]
    strategy:
      fail-fast: false
      matrix:
        workspace:
          - quanta-kit-design-system-react
          - quanta-kit-design-system-vue
          - quanta-kit-design-system-angular
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules cache
        uses: actions/cache/restore@v5
        with:
          path: |
            node_modules
            packages/*/node_modules
            apps/*/node_modules
          key: ${{ runner.os }}-node-modules-${{ env.CACHE_VERSION }}-${{ hashFiles('**/package-lock.json') }}
          fail-on-cache-miss: true

      - name: Build workspace package
        run: npm run build --workspace=${{ matrix.workspace }}

      - name: Run runtime smoke
        run: node scripts/runtime-smoke.cjs --workspace=${{ matrix.workspace }}

  changeset-policy:
    name: Changeset Policy
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.actor != 'dependabot[bot]'
    needs: install
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Verify empty changeset policy
        run: |
          git fetch origin main:main
          node scripts/verify-changeset-policy.cjs origin/main...HEAD

  changeset-status:
    name: Changeset Status
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.actor != 'dependabot[bot]'
    needs: install
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules cache
        uses: actions/cache/restore@v5
        with:
          path: |
            node_modules
            packages/*/node_modules
            apps/*/node_modules
          key: ${{ runner.os }}-node-modules-${{ env.CACHE_VERSION }}-${{ hashFiles('**/package-lock.json') }}
          fail-on-cache-miss: true

      - name: Check changeset status
        run: |
          echo "::group::Changeset Status"
          git fetch origin main:main
          npm run changeset:status -- --since=origin/main
          echo "::endgroup::"
