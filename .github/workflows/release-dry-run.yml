name: Release Dry Run

on:
  workflow_dispatch:
    inputs:
      channel:
        description: "Release channel simulation"
        required: true
        default: stable
        type: choice
        options:
          - stable
          - next
          - beta
          - alpha
          - rc
          - canary

env:
  NODE_VERSION: "20.19.0"
  CI: true

jobs:
  dry-run:
    name: Dry Run (${{ github.event.inputs.channel }})
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Validate PR parity
        run: npm run validate:pr

      - name: Changesets dry run
        run: |
          npx changeset status --verbose
          npx changeset version --snapshot ${{ github.event.inputs.channel }}
          echo "::notice::Dry run complete. No publish performed."
