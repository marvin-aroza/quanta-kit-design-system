name: Manual Package Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Git tag to release from"
        required: true
        type: string
      package:
        description: "Package(s) to publish"
        required: true
        type: choice
        default: "all"
        options:
          - all
          - quanta-kit-design-system-react
          - quanta-kit-design-system-vue
          - quanta-kit-design-system-angular
      npm_tag:
        description: "npm dist-tag (stable maps to latest)"
        required: true
        default: "stable"
        type: string
      dry_run:
        description: "Run npm publish with --dry-run"
        required: true
        default: false
        type: boolean

concurrency:
  group: manual-release-${{ github.event.inputs.release_tag }}-${{ github.event.inputs.package }}-${{ github.event.inputs.npm_tag }}
  cancel-in-progress: false

env:
  NODE_VERSION: "20.19.0"
  CI: true

jobs:
  validate:
    name: Validate Release Inputs
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      dist_tag: ${{ steps.meta.outputs.dist_tag }}
      package: ${{ steps.meta.outputs.package }}
      dry_run: ${{ steps.meta.outputs.dry_run }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate inputs and release ref
        id: meta
        env:
          INPUT_PACKAGE: ${{ github.event.inputs.package }}
          INPUT_RELEASE_TAG: ${{ github.event.inputs.release_tag }}
          INPUT_NPM_TAG: ${{ github.event.inputs.npm_tag }}
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          SELECTED="$INPUT_PACKAGE"
          case "$SELECTED" in
            all|quanta-kit-design-system-react|quanta-kit-design-system-vue|quanta-kit-design-system-angular) ;;
            *)
              echo "::error::Invalid package input: $SELECTED"
              exit 1
              ;;
          esac

          TAG_INPUT="$INPUT_RELEASE_TAG"
          TAG="${TAG_INPUT#refs/tags/}"
          if ! git rev-parse --verify "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "::error::Release tag not found: $TAG_INPUT"
            exit 1
          fi

          git fetch origin main:refs/remotes/origin/main
          TAG_SHA=$(git rev-list -n 1 "refs/tags/$TAG")
          if ! git merge-base --is-ancestor "$TAG_SHA" origin/main; then
            echo "::error::Selected tag $TAG is not reachable from origin/main."
            exit 1
          fi

          DIST_TAG="$INPUT_NPM_TAG"
          if [ "$DIST_TAG" = "stable" ]; then
            DIST_TAG="latest"
          fi
          if ! [[ "$DIST_TAG" =~ ^[A-Za-z0-9][A-Za-z0-9._-]*$ ]]; then
            echo "::error::Invalid npm tag: $DIST_TAG"
            exit 1
          fi

          {
            echo "tag=$TAG"
            echo "dist_tag=$DIST_TAG"
            echo "package=$SELECTED"
            echo "dry_run=$INPUT_DRY_RUN"
          } >> "$GITHUB_OUTPUT"

  publish-dry-run:
    name: Publish From Tag (Dry Run)
    if: needs.validate.outputs.dry_run == 'true'
    needs: [validate]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Checkout selected release tag
        env:
          RELEASE_TAG: ${{ needs.validate.outputs.tag }}
        run: git checkout "refs/tags/$RELEASE_TAG"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Publish selected package(s)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          SELECTED_INPUT: ${{ needs.validate.outputs.package }}
          DIST_TAG_INPUT: ${{ needs.validate.outputs.dist_tag }}
          RELEASE_TAG_INPUT: ${{ needs.validate.outputs.tag }}
        run: |
          SELECTED="$SELECTED_INPUT"
          DIST_TAG="$DIST_TAG_INPUT"
          RELEASE_TAG="$RELEASE_TAG_INPUT"
          RESULTS_FILE="release-results.txt"
          FAILURE_COUNT=0
          : > "$RESULTS_FILE"

          publish_one() {
            PKG_NAME="$1"
            WORKSPACE="$2"
            PUBLISH_DIR="$3"
            echo "::group::Publish $PKG_NAME from $RELEASE_TAG (dry-run)"

            if ! npm run build --workspace="$WORKSPACE"; then
              echo "::error::Build failed for workspace $WORKSPACE"
              echo "${PKG_NAME} | failed-build | ${DIST_TAG}" >> "$RESULTS_FILE"
              FAILURE_COUNT=$((FAILURE_COUNT + 1))
              echo "::endgroup::"
              return 0
            fi

            VERSION=$(node -p "require('./${PUBLISH_DIR}/package.json').version")

            if npm view "${PKG_NAME}@${VERSION}" version >/dev/null 2>&1; then
              echo "::notice::${PKG_NAME}@${VERSION} already exists on npm. Skipping."
              echo "${PKG_NAME}@${VERSION} | skipped-existing | ${DIST_TAG}" >> "$RESULTS_FILE"
              echo "::endgroup::"
              return 0
            fi

            if (cd "$PUBLISH_DIR" && npm publish --tag "$DIST_TAG" --access public --provenance --dry-run); then
              echo "${PKG_NAME}@${VERSION} | dry-run-ok | ${DIST_TAG}" >> "$RESULTS_FILE"
            else
              echo "::error::Dry-run publish failed for ${PKG_NAME}@${VERSION}"
              echo "${PKG_NAME}@${VERSION} | failed-dry-run | ${DIST_TAG}" >> "$RESULTS_FILE"
              FAILURE_COUNT=$((FAILURE_COUNT + 1))
            fi
            echo "::endgroup::"
          }

          if [ "$SELECTED" = "all" ] || [ "$SELECTED" = "quanta-kit-design-system-react" ]; then
            publish_one "quanta-kit-design-system-react" "quanta-kit-design-system-react" "packages/quanta-kit-react"
          fi
          if [ "$SELECTED" = "all" ] || [ "$SELECTED" = "quanta-kit-design-system-vue" ]; then
            publish_one "quanta-kit-design-system-vue" "quanta-kit-design-system-vue" "packages/quanta-kit-vue"
          fi
          if [ "$SELECTED" = "all" ] || [ "$SELECTED" = "quanta-kit-design-system-angular" ]; then
            publish_one "quanta-kit-design-system-angular" "quanta-kit-design-system-angular" "packages/quanta-kit-angular"
          fi

          if [ "$FAILURE_COUNT" -gt 0 ]; then
            echo "::error::$FAILURE_COUNT package operation(s) failed during dry-run."
            exit 1
          fi

      - name: Publish summary
        env:
          RELEASE_TAG: ${{ needs.validate.outputs.tag }}
          RELEASE_PACKAGE: ${{ needs.validate.outputs.package }}
          RELEASE_DIST_TAG: ${{ needs.validate.outputs.dist_tag }}
        run: |
          {
            echo "## Manual Release Summary (Dry Run)"
            echo "- Tag: \`$RELEASE_TAG\`"
            echo "- Package selection: \`$RELEASE_PACKAGE\`"
            echo "- npm dist-tag: \`$RELEASE_DIST_TAG\`"
            echo ""
            echo "### Results"
            cat release-results.txt
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload release results
        uses: actions/upload-artifact@v6
        with:
          name: release-results-${{ needs.validate.outputs.tag }}-dry-run
          path: release-results.txt
          if-no-files-found: error

  publish:
    name: Publish From Tag
    if: needs.validate.outputs.dry_run != 'true'
    needs: [validate]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: "npm-release"
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Checkout selected release tag
        env:
          RELEASE_TAG: ${{ needs.validate.outputs.tag }}
        run: git checkout "refs/tags/$RELEASE_TAG"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Publish selected package(s)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          SELECTED_INPUT: ${{ needs.validate.outputs.package }}
          DIST_TAG_INPUT: ${{ needs.validate.outputs.dist_tag }}
          RELEASE_TAG_INPUT: ${{ needs.validate.outputs.tag }}
        run: |
          SELECTED="$SELECTED_INPUT"
          DIST_TAG="$DIST_TAG_INPUT"
          RELEASE_TAG="$RELEASE_TAG_INPUT"
          RESULTS_FILE="release-results.txt"
          FAILURE_COUNT=0
          : > "$RESULTS_FILE"

          publish_one() {
            PKG_NAME="$1"
            WORKSPACE="$2"
            PUBLISH_DIR="$3"
            echo "::group::Publish $PKG_NAME from $RELEASE_TAG"

            if ! npm run build --workspace="$WORKSPACE"; then
              echo "::error::Build failed for workspace $WORKSPACE"
              echo "${PKG_NAME} | failed-build | ${DIST_TAG}" >> "$RESULTS_FILE"
              FAILURE_COUNT=$((FAILURE_COUNT + 1))
              echo "::endgroup::"
              return 0
            fi

            VERSION=$(node -p "require('./${PUBLISH_DIR}/package.json').version")

            if npm view "${PKG_NAME}@${VERSION}" version >/dev/null 2>&1; then
              echo "::notice::${PKG_NAME}@${VERSION} already exists on npm. Skipping."
              echo "${PKG_NAME}@${VERSION} | skipped-existing | ${DIST_TAG}" >> "$RESULTS_FILE"
              echo "::endgroup::"
              return 0
            fi

            if (cd "$PUBLISH_DIR" && npm publish --tag "$DIST_TAG" --access public --provenance); then
              echo "${PKG_NAME}@${VERSION} | published | ${DIST_TAG}" >> "$RESULTS_FILE"
            else
              echo "::error::Publish failed for ${PKG_NAME}@${VERSION}"
              echo "${PKG_NAME}@${VERSION} | failed-publish | ${DIST_TAG}" >> "$RESULTS_FILE"
              FAILURE_COUNT=$((FAILURE_COUNT + 1))
            fi
            echo "::endgroup::"
          }

          if [ "$SELECTED" = "all" ] || [ "$SELECTED" = "quanta-kit-design-system-react" ]; then
            publish_one "quanta-kit-design-system-react" "quanta-kit-design-system-react" "packages/quanta-kit-react"
          fi
          if [ "$SELECTED" = "all" ] || [ "$SELECTED" = "quanta-kit-design-system-vue" ]; then
            publish_one "quanta-kit-design-system-vue" "quanta-kit-design-system-vue" "packages/quanta-kit-vue"
          fi
          if [ "$SELECTED" = "all" ] || [ "$SELECTED" = "quanta-kit-design-system-angular" ]; then
            publish_one "quanta-kit-design-system-angular" "quanta-kit-design-system-angular" "packages/quanta-kit-angular"
          fi

          if [ "$FAILURE_COUNT" -gt 0 ]; then
            echo "::error::$FAILURE_COUNT package operation(s) failed during publish."
            exit 1
          fi

      - name: Publish summary
        env:
          RELEASE_TAG: ${{ needs.validate.outputs.tag }}
          RELEASE_PACKAGE: ${{ needs.validate.outputs.package }}
          RELEASE_DIST_TAG: ${{ needs.validate.outputs.dist_tag }}
        run: |
          {
            echo "## Manual Release Summary"
            echo "- Tag: \`$RELEASE_TAG\`"
            echo "- Package selection: \`$RELEASE_PACKAGE\`"
            echo "- npm dist-tag: \`$RELEASE_DIST_TAG\`"
            echo ""
            echo "### Results"
            cat release-results.txt
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload release results
        uses: actions/upload-artifact@v6
        with:
          name: release-results-${{ needs.validate.outputs.tag }}
          path: release-results.txt
          if-no-files-found: error
